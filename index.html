<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IES CARPE DIEM - Biblioteca Hipatia 🦉</title>
    <link rel="icon" href="https://site.educa.madrid.org/ies.carpediem.fuenlabrada//wp-content/uploads/ies.carpediem.fuenlabrada/2023/03/logo-carpe-diem-cuadrado-500x500-blanco-100x100.png" sizes="32x32" />
    <link rel="icon" href="https://site.educa.madrid.org/ies.carpediem.fuenlabrada//wp-content/uploads/ies.carpediem.fuenlabrada/2023/03/logo-carpe-diem-cuadrado-500x500-blanco-300x300.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="https://site.educa.madrid.org/ies.carpediem.fuenlabrada//wp-content/uploads/ies.carpediem.fuenlabrada/2023/03/logo-carpe-diem-cuadrado-500x500-blanco-300x300.png" />
    <meta name="msapplication-TileImage" content="https://site.educa.madrid.org/ies.carpediem.fuenlabrada//wp-content/uploads/ies.carpediem.fuenlabrada/2023/03/logo-carpe-diem-cuadrado-500x500-blanco-300x300.png" />

    <!-- Preload de recursos -->
    <link rel="preload" href="./data/Ejemplares.xml" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="https://raw.githubusercontent.com/IES-Carpe-Diem/Biblioteca-Hipatia/main/logo%20biblioteca.png" as="image">

    <!-- Librerías externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.3.10/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.18/marked.min.js"></script>
    <meta name="dcterms.conformance" content="WCAG 2.2 AA">

    <!-- CSS modular -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/accessibility.css">
</head>
<body data-theme="light" data-daltonism="normal">
    <a href="#main-content" class="skip-link" aria-label="Ir al contenido principal">Saltar al contenido principal</a>

    <!-- SPLASH -->
    <div id="splash" tabindex="0">
        <div class="splash-container">
            <img src="https://raw.githubusercontent.com/IES-Carpe-Diem/Biblioteca-Hipatia/main/logo%20biblioteca.png"
                 alt="Logo de la Biblioteca Hipatia"
                 loading="lazy"
                 onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjY2NjIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkxvZ28gTm8gQ2FycmVnYWRvPC90ZXh0Pjwvc3ZnPg=='">
            <h2>¡Bienvenidos a la Biblioteca Hipatia!</h2>
            <p>Cargando el catálogo de libros y aventuras...</p>
        </div>
    </div>

    <!-- APP -->
    <div id="app" style="display:none;">
        <header role="banner">
            <div class="theme-controls">
                <button class="theme-toggle" aria-label="Cambiar entre tema claro y oscuro">🌙</button>
                <button class="accessibility-toggle" aria-label="Abrir ajustes de accesibilidad">♿</button>
                <button class="logout-btn" style="display:none;">Cerrar Sesión 🔒</button>
            </div>
            <h1>🦉 Biblioteca Hipatia - 
                <a href="https://site.educa.madrid.org/ies.carpediem.fuenlabrada/" target="_blank" rel="noopener noreferrer" style="color:#fff;">
                    IES CARPE DIEM
                </a>
            </h1>
            <div class="header-search" role="search">
                <input type="search" id="buscarInput" placeholder="Busca por título, autor, tejuelo, categoría" list="sugerenciasBusqueda" autocomplete="off">
                <datalist id="sugerenciasBusqueda"></datalist>
                <button class="buscar-btn">Buscar 🔍</button>
                <div class="action-buttons">
                    <button class="reserva-btn">Reserva 📚</button>
                    <button class="reseña-btn">Reseña ✍️</button>
                    <button class="solicitud-btn">Solicitud 🗳️</button>
                    <button class="donaciones-btn">Donación 📦</button>
                    <button class="favoritos-btn">❤️</button>
                    <button class="valorados-btn">⭐</button>
                </div>
            </div>
        </header>

        <main id="main-content" tabindex="-1">
            <section id="seccionIzquierda">
                <h3 id="tituloRecomendados">La bibliotecaria está buscando los libros de hoy...</h3>
                <p id="contadorDia"></p>
                <div id="recomendadosGrid" class="recomendados-grid"></div>
            </section>

            <section id="chatSection">
                <h2 id="chatTitle">Hipat-IA</h2>
                <div id="chatMensajes"></div>
                <div class="chat-controls">
                    <input type="text" id="chatInput" placeholder="Libros, sinopsis, recomendaciones...">
                    <button>Enviar 💬</button>
                </div>
            </section>

            <section id="seccionDerecha">
                <h3>Portadas rotativas</h3>
                <div id="rotativasContainer" class="rotativas-container"></div>
            </section>
        </main>

        <footer>
            <p><img src="https://site.educa.madrid.org/ies.carpediem.fuenlabrada//wp-content/uploads/ies.carpediem.fuenlabrada/2023/03/logo-carpe-diem-cuadrado-500x500-blanco-100x100.png" alt="Logo IES Carpe Diem"> IES CARPE DIEM © 2025</p>
        </footer>

        <!-- MODALES -->
        <div id="searchModal"></div>
        <div id="adminModal"></div>
        <div id="favoritosModal"></div>
        <div id="valoradosModal"></div>
        <div id="accessibilityModal"></div>
    </div>

    <!-- JS principal -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
